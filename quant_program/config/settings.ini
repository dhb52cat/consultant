# Real trading platform settings will go here (e.g., JoinQuant credentials)
# JOINQUANT_USERNAME = YOUR_JOINQUANT_USERNAME
# JOINQUANT_PASSWORD = YOUR_JOINQUANT_PASSWORD

[DATA]
# 沪深北个股数据源: tushare, akshare
